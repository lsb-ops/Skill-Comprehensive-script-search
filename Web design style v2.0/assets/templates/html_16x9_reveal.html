  <style>

    /* v3.7: 滚动驱动 3D 视差层 (配合 3d-tilt.js) */

    /* v3.7: 13 layouts 专属 3D 处理 */

    /* v3.12: 配色美学 (OKLCH + 暗色 + 语义色 + 5 级色阶) */

    /* v3.12: 布局美学 (12-col grid + 比例 + z-index + 呼吸 + 重量) */

    /* v3.13: 动画物理规律 (MD3 easing + duration 6 token + 弹簧近似) */

    /* v3.13: Gestalt 视觉原则 (5 大原则 + 额外 Common Fate) */

    /* v3.13: 色彩和谐 + CVD-safe (互补/三角/相邻 + 色盲友好) */

    /* v3.14 (legacy, 已废弃): 字体/主题/motion-language - 全部 DEPRECATED */

    /* v3.15 (legacy, 已废弃): 7 archetypes - 全部 DEPRECATED, 不是网页思维 */

    /* ===== v3.16: Web-First Architecture (取代 PPT 思维) ===== */

    /* 11 个 Section 组件 - 网页组件, 不是幻灯片原型 */
    @import url("./assets/sections/nav.css");

    @import url("./assets/responsive/breakpoints.css");

    /* 交互状态系统 (hover/focus/active + touch) */

    /* ===== v3.17: Component Layer (6 核心组件) ===== */
    @import url("./assets/components/modal.css");
    @import url("./assets/components/tabs.css");
    @import url("./assets/components/carousel.css");

    /* ===== v3.18: Token v2 (基于开源研究综合) ===== */
    /* shadcn HSL 拆段 + OKLCH 语义色 + CVD 安全 + WCAG 2.2 focus */
    @import url("./assets/design/color-tokens-v2.css");
    /* Open Props shadow-1..5 5 级 elevation */
    @import url("./assets/design/elevation.css");

    /* ===== v3.19.1: MD3 真实开源改进 ===== */
    /* MD3 15 type styles (display/headline/title/body/label × 3) + Tailwind 13 sizes */
    @import url("./assets/design/typography-tokens.css");
    /* MD3 8 corner tokens + Tailwind 8 radii + shadcn 派生 */
    @import url("./assets/design/radius-tokens.css");

    /* ===== v3.19.2: MD3 Surface + Color Roles + Container + State ===== */
    /* MD3 5 surface-container + 2 variant (lowest→highest) */
    @import url("./assets/design/surface-tokens.css");
    /* MD3 20+ color roles (primary-container, on-*, inverse-*, etc.) */
    @import url("./assets/design/color-roles.css");
    /* CSS @container 容器查询 (sidebar/card/main 命名 container) */
    @import url("./assets/utilities/container-queries.css");
    /* data-state / data-open / data-checked 自定义 variant (Radix + shadcn 真实) */
    @import url("./assets/utilities/state-variants.css");

    /* ============================================
       WebPPT Maker v3.0 · 16:9 Landscape reveal.js
       ============================================ */
    :root {
      --slide-width: 1280px;
      --slide-height: 720px;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F5F5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --accent: #FF3B30;
      --border: #E5E5E5;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
      --font-size-base: 28px;
      --font-size-h1: 64px;
      --font-size-h2: 48px;
      --font-size-body: 28px;
      --font-size-caption: 20px;
      --space-xs: 12px;
      --space-sm: 24px;
      --space-md: 40px;
      --space-lg: 64px;
      --space-xl: 96px;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
    }

    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: var(--text-primary);
    }

    .reveal { width: 100%; height: 100%; }
    .reveal .slides { width: 100%; height: 100%; text-align: left; }

    .reveal .slides > section {
      width: var(--slide-width);
      height: var(--slide-height);
      padding: var(--space-lg) var(--space-xl);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      background: var(--bg-primary);
      box-sizing: border-box;
    }

    /* === DENSITY dial: 1-3 = 1.5× 字号 / 4-6 = 默认 / 7-10 = 0.7× 字号 === */
    body[data-density="low"] { --font-size-base: 42px; --font-size-h1: 96px; --font-size-h2: 72px; --font-size-body: 42px; }
    body[data-density="default"] { --font-size-base: 28px; --font-size-h1: 64px; --font-size-h2: 48px; --font-size-body: 28px; }
    body[data-density="high"] { --font-size-base: 20px; --font-size-h1: 48px; --font-size-h2: 36px; --font-size-body: 20px; }

    /* === Layout: card === */
    .layout-card .card {
      width: 80%; max-width: 900px;
      padding: var(--space-lg) var(--space-xl);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .layout-card .number {
      display: inline-block;
      width: 80px; height: 80px; line-height: 80px;
      border-radius: 50%;
      background: var(--accent); color: white;
      font-size: 40px; font-weight: bold;
      margin-bottom: var(--space-md);
    }

    /* === Layout: poster === */
    .layout-poster { background: var(--accent); color: white; }
    .layout-poster .big-text { font-size: 96px; font-weight: 900; line-height: 1.2; letter-spacing: -2px; max-width: 90%; }
    .layout-poster .sub-text { font-size: 36px; opacity: 0.9; margin-top: var(--space-md); max-width: 80%; }

    /* === Layout: timeline === */
    .layout-timeline { align-items: flex-start; text-align: left; padding: var(--space-xl); }
    .layout-timeline .timeline-item { display: flex; gap: var(--space-md); width: 100%; max-width: 1000px; margin-bottom: var(--space-md); }
    .layout-timeline .timeline-dot { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); margin-top: 18px; box-shadow: 0 0 0 6px rgba(255, 59, 48, 0.2); }
    .layout-timeline .timeline-content { flex: 1; }
    .layout-timeline .timeline-content h2 { font-size: var(--font-size-h2); margin-bottom: var(--space-xs); }

    /* === Layout: numbers === */
    .layout-numbers { justify-content: center; }
    .layout-numbers .big-number { font-size: 200px; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: var(--space-lg); letter-spacing: -4px; text-shadow: 0 4px 20px rgba(255, 59, 48, 0.2); }
    .layout-numbers .unit { font-size: 80px; font-weight: 700; color: var(--text-secondary); margin-left: 16px; }

    /* === Layout: compare === */
    .layout-compare { gap: var(--space-md); flex-direction: column; }
    .layout-compare .compare-row { display: flex; gap: var(--space-md); width: 100%; max-width: 1000px; }
    .layout-compare .compare-card { flex: 1; padding: var(--space-md) var(--space-lg); border-radius: var(--radius-md); text-align: left; }
    .layout-compare .compare-card.before { background: #FFE5E5; color: #C92A2A; }
    .layout-compare .compare-card.after { background: #E5F7E5; color: #2A9D2A; }
    .layout-compare .compare-card .label { font-size: var(--font-size-caption); font-weight: 700; margin-bottom: var(--space-xs); opacity: 0.7; }
    .layout-compare .compare-card .content { font-size: 32px; font-weight: 500; }
    .layout-compare .compare-arrow { display: none; }

    /* === Layout: icon === */
    .layout-icon { gap: var(--space-md); }
    .layout-icon .big-emoji { font-size: 200px; margin-bottom: var(--space-md); line-height: 1; filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15)); }

    /* === Layout: storyline === */
    .layout-storyline { align-items: flex-start; text-align: left; padding: var(--space-xl); }
    .layout-storyline .story-flow { width: 100%; max-width: 1000px; }
    .layout-storyline .story-step { display: inline-block; padding: 8px 20px; background: var(--accent); color: white; font-size: var(--font-size-caption); font-weight: 700; border-radius: var(--radius-sm); margin-bottom: var(--space-md); }
    .layout-storyline .title { font-size: var(--font-size-h1); margin-bottom: var(--space-md); }
    .layout-storyline .body { text-align: left; max-width: 900px; }

    /* === Layout: qa === */
    .layout-qa { align-items: stretch; text-align: left; gap: var(--space-md); }
    .layout-qa .qa-question, .layout-qa .qa-answer { display: flex; gap: var(--space-md); align-items: flex-start; padding: var(--space-md) var(--space-lg); border-radius: var(--radius-md); width: 80%; max-width: 1000px; }
    .layout-qa .qa-question { background: var(--bg-secondary); }
    .layout-qa .qa-answer { background: rgba(255, 59, 48, 0.08); }
    .layout-qa .qa-tag { flex-shrink: 0; display: inline-block; width: 56px; height: 56px; line-height: 56px; text-align: center; border-radius: 50%; background: var(--accent); color: white; font-weight: 700; font-size: 28px; }
    .layout-qa .qa-answer .qa-tag { background: var(--text-secondary); }
    .layout-qa .qa-question .title { font-size: var(--font-size-h2); flex: 1; text-align: left; margin: 0; }
    .layout-qa .qa-answer .body { flex: 1; margin: 0; text-align: left; }

    /* === Layout: waterfall === */
    .layout-waterfall { align-items: stretch; text-align: left; gap: var(--space-md); }
    .layout-waterfall .title { font-size: var(--font-size-h1); margin-bottom: var(--space-sm); }
    .layout-waterfall .body { text-align: left; max-width: 1100px; }

    /* === Universal === */
    .title { font-size: var(--font-size-h1); font-weight: 800; line-height: 1.2; margin-bottom: var(--space-md); letter-spacing: -1px; }
    .subtitle { font-size: var(--font-size-base); color: var(--text-secondary); font-weight: 500; }
    .body { font-size: var(--font-size-body); color: var(--text-primary); line-height: 1.6; margin-top: var(--space-sm); white-space: pre-line; }
    .emoji { font-size: 100px; margin-bottom: var(--space-md); display: inline-block; }

    /* === v3.4 字体层次 + 中文优化 === */
    /* 字体权重层级: 400 (body) / 500 (subtitle) / 700 (label) / 800 (title) / 900 (poster) */
    /* 中文字符不应用负 letter-spacing, 用 0 或正 spacing 提升可读性 */
    .title:lang(zh), .title[lang="zh"] { letter-spacing: 0; }
    .layout-poster .big-text:lang(zh) { letter-spacing: 0; }
    .layout-numbers .big-number:lang(zh) { letter-spacing: 0; }
    .body:lang(zh), .body[lang="zh"] { line-height: 1.7; letter-spacing: 0.3px; }
    /* 英文/数字保持负 spacing 紧凑感 */
    .title:lang(en), .title[lang="en"] { letter-spacing: -1px; }

    /* === Page cover === */
    .page-cover { background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%); background-size: 200% 200%; padding: var(--space-xl); animation: drift-bg 8s ease-in-out infinite; }
    .page-cover .title { font-size: 80px; font-weight: 900; background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; max-width: 90%; }
    .page-cover .subtitle { font-size: 36px; color: var(--text-secondary); margin-top: var(--space-md); }

    /* === v3.5 噪点叠加 (质感提升) === */
    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      z-index: 100;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* === Page CTA === */
    .page-cta { background: var(--accent); color: white; }
    .page-cta .title { color: white; font-size: 80px; }
    .page-cta .body { color: white; opacity: 0.9; font-size: 36px; }

    /* === reveal.js controls === */
    .reveal .controls { bottom: 20px; right: 20px; }
    .reveal .progress { height: 6px; background: var(--accent); }
    .reveal .slide-number { bottom: 20px; left: 20px; font-size: 16px; color: var(--text-secondary); background: rgba(255, 255, 255, 0.9); padding: 4px 12px; border-radius: var(--radius-sm); }

    /* === Fragment animations === */
    .reveal .slides section .fragment-fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal .slides section.visible .fragment-fade-up { opacity: 1; transform: translateY(0); }
    .reveal .slides section .fragment-slide-left { opacity: 0; transform: translateX(-80px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal .slides section.visible .fragment-slide-left { opacity: 1; transform: translateX(0); }
    .reveal .slides section .fragment-slide-right { opacity: 0; transform: translateX(80px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal .slides section.visible .fragment-slide-right { opacity: 1; transform: translateX(0); }
    .reveal .slides section .fragment-zoom-in { opacity: 0; transform: scale(0.5); transition: opacity 0.5s ease, transform 0.5s ease; }
    .reveal .slides section.visible .fragment-zoom-in { opacity: 1; transform: scale(1); }
    .reveal .slides section .fragment-bounce { opacity: 0; transform: scale(0.3) translateY(-50px); transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
    .reveal .slides section.visible .fragment-bounce { opacity: 1; transform: scale(1) translateY(0); }

    /* === Visual element position classes (v3.2) === */
    .visual-top, .visual-above { width: 100%; text-align: center; margin-bottom: var(--space-md); }
    .visual-top .big-emoji, .visual-above .big-emoji { font-size: 96px; line-height: 1; }
    .visual-side { display: inline-block; margin-right: var(--space-sm); margin-bottom: var(--space-md); vertical-align: middle; }
    .visual-side .big-emoji { font-size: 48px; line-height: 1; }
    .visual-inline { display: inline-block; margin-right: var(--space-xs); vertical-align: middle; }
    .visual-inline .big-emoji { font-size: 32px; line-height: 1; }

    /* === Camera direction (shot_type) — v3.2 === */
    .shot-特写 .title { font-size: calc(var(--font-size-h1) * 1.15); }
    .shot-特写 .body { max-width: 75%; }
    .shot-中景 .body { max-width: 90%; }
    .shot-全景 .title { font-size: calc(var(--font-size-h1) * 0.85); max-width: 95%; }
    .shot-全景 .body { max-width: 100%; }
  </style>
</head>
<body data-density="default" data-mode="landscape">
  <div class="reveal">
    <div class="slides">
      <section class="page-cover" data-page="1" data-mode="landscape">
        <div class="emoji">📱</div>
        <h1 class="title">{{TOPIC}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </section>
      {{PAGES_CONTENT}}
      <section class="page-cta" data-page="{{TOTAL_PAGES}}" data-mode="landscape">
        <div class="emoji">✨</div>
        <h2 class="title">你学会了吗？</h2>
        <p class="body">{{CTA_TEXT}}</p>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script>
    Reveal.initialize({
      width: 1280, height: 720,
      controls: true, controlsTutorial: true, controlsLayout: 'bottom-right',
      progress: true, slideNumber: 'c/t',
      transition: 'slide', transitionSpeed: 'default',
      autoSlide: 0, mouseWheel: false, touch: true,
      keyboard: true, overview: true, center: true,
      loop: false, fragments: true, fragmentInURL: false, hash: true,
    });
  </script>
  <script src="./assets/motion/_utils/loader.js"></script>
  <script src="./assets/motion/engine.js"></script>
  <script src="./assets/motion/3d-tilt.js"></script>
  <script src="./assets/motion/magnetic-follower.js"></script>
  <script src="./assets/motion/particles-3d.js"></script>
  <script src="./assets/motion/shadow-tracker.js"></script>
  <script src="./assets/motion/transition-3d.js"></script>
  <script src="./assets/motion/depth-of-field.js"></script>
  <script src="./assets/motion/card-flip-3d.js"></script>
  <script src="./assets/motion/drag-rotate-3d.js"></script>
  <script src="./assets/motion/parallax-3d.js"></script>
  <script src="./assets/motion/_utils/spring.js"></script>
  <script src="./assets/motion/_utils/attention.js"></script>
  <script src="./assets/motion/_utils/harmony-check.js"></script>
  <script src="./assets/motion/_utils/spring.js"></script>
  <script src="./assets/motion/_utils/spring-preset.js"></script>
  <!-- v3.14+v3.15 (legacy) DEPRECATED: theme/archetype 全部废弃, 是 PPT 思维 -->
  <!-- <script src="./assets/motion/_utils/theme-detect.js"></script> -->
  <!-- <script src="./assets/motion/_utils/theme-applier.js"></script> -->
  <!-- <script src="./assets/composition/archetype-detect.js"></script> -->
  <!-- <script src="./assets/composition/archetype-applier.js"></script> -->

  <!-- ===== v3.16: Web-First Engine (取代 PPT 思维) ===== -->
  <!-- page-detect.js: 检测页面类型 (URL/meta/DOM 综合判断) -->
