version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # We only use stdlib in scripts; this entry exists for forward compatibility
    # if `requirements.txt` is added later.

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "devcontainer"
    labels:
      - "dependencies"
    # Disabled by default; uncomment if .devcontainer/ is added
